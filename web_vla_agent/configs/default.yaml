# ============================================================
# VLA Web Agent — Configuration (Multimodal Sequential VLM)
# ============================================================

model:
  # Multimodal VLM backbone
  name: "Qwen/Qwen2-VL-2B-Instruct"
  max_new_tokens: 256
  temperature: 0.1
  top_p: 0.9
  repetition_penalty: 1.1

  # QLoRA configuration
  use_qlora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  quantization_bits: 4

  # Image resolution limits for Qwen2-VL processor
  # With 64 candidates (~960 tokens) + task/history (~200 tokens),
  # vision must fit within 2048 - 1160 = ~888 token budget.
  # 200704 = 256 * 28 * 28 → ~450 vision tokens (after 2×2 merge).
  image_min_pixels: 43904      # 56 * 28 * 28 — ~150 vision tokens min
  image_max_pixels: 200704     # 256 * 28 * 28 — ~450 vision tokens max

  # Action types
  action_types: ["CLICK", "TYPE", "SELECT", "SCROLL", "DONE"]

training:
  # Stage 1: Single-step imitation
  stage1_epochs: 3
  # Stage 2: Multi-step imitation (aligned to 5)
  stage2_epochs: 5
  # Stage 3 (optional): RL fine-tuning
  stage3_epochs: 0

  learning_rate: 2.0e-4
  weight_decay: 0.01
  batch_size: 1
  gradient_accumulation_steps: 8  # effective batch = 8
  warmup_ratio: 0.1
  max_grad_norm: 1.0
  seed: 42

  # Mixed precision
  fp16: false
  bf16: true

  # Checkpointing
  save_every_n_epochs: 1
  checkpoint_dir: "checkpoints_v2"
  logging_steps: 50

  # Dataset
  max_seq_length: 2048

data:
  dataset_name: "osunlp/Multimodal-Mind2Web"
  max_dom_nodes: 120
  max_action_history: 10
  max_text_per_node: 80
  scroll_augmentation: true
  scroll_aug_ratio: 0.05
  max_neg_candidates: 63    # 63 neg + 1 pos = 64 total
  max_candidates: 64        # standardized candidate count

environment:
  headless: false
  viewport_width: 1280
  viewport_height: 720
  timeout_ms: 30000
  max_steps: 30
  max_scroll_attempts: 3

uncertainty:
  # Token-level confidence
  min_log_prob_threshold: -2.0   # average log-prob below this triggers regeneration
  beam_width: 3                   # for beam disagreement
  max_regenerations: 2            # max re-generation attempts

evaluation:
  splits: ["test_task", "test_website", "test_domain"]

logging:
  level: "INFO"
  log_dir: "logs"
  use_wandb: false
  wandb_project: "web-vla-agent"

# ── Groq cloud inference backend ─────────────────────────────────────────────
# Used when --backend groq is passed to inference/run_agent.py.
# Requires GROQ_API_KEY environment variable (or in a .env file).
#
# Recommended vision-capable models:
#   meta-llama/llama-4-scout-17b-16e-instruct   (fast, multimodal) ← default
#   meta-llama/llama-4-maverick-17b-128e-instruct
#   llama-3.2-11b-vision-preview
#   llama-3.2-90b-vision-preview
#
# Text-only (no screenshot) alternatives:
#   llama-3.3-70b-versatile
#   llama-3.1-8b-instant
groq:
  model: "meta-llama/llama-4-scout-17b-16e-instruct"
  max_new_tokens: 256
  temperature: 0.2
  top_p: 0.9
